<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>My Claude</title>
<style>
  :root {
    --bg:#0e0f13; --sidebar:#15171d; --panel:#15171d; --panel-2:#1d2027; --panel-3:#262a33;
    --border:#2b2f39; --border-soft:#22262e;
    --text:#ececf1; --muted:#9aa1ad; --faint:#6b7280;
    --accent:#c96442; --accent-2:#d97757; --accent-soft:rgba(201,100,66,.15);
    --user-bubble:#1f2733;
    --danger:#e5675b; --link:#8ab4f8; --ok:#46c469;
  }
  * { box-sizing:border-box; }
  html,body { height:100%; margin:0; }
  body {
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",system-ui,sans-serif;
    background:var(--bg); color:var(--text); height:100vh; overflow:hidden; -webkit-font-smoothing:antialiased;
  }
  button { font-family:inherit; }

  .app { display:flex; height:100vh; }

  .sidebar { width:268px; flex-shrink:0; background:var(--sidebar); border-right:1px solid var(--border-soft); display:flex; flex-direction:column; transition:transform .25s ease; z-index:30; }
  .sidebar .brand { display:flex; align-items:center; gap:10px; padding:16px 16px 10px; }
  .brand .logo { width:26px; height:26px; border-radius:8px; background:linear-gradient(135deg,var(--accent),var(--accent-2)); display:flex; align-items:center; justify-content:center; color:#fff; font-weight:800; font-size:14px; }
  .brand .name { font-size:15px; font-weight:650; letter-spacing:.2px; }
  .brand .status { width:8px; height:8px; border-radius:50%; background:#4b5563; margin-left:auto; transition:background .3s; }
  .brand .status.on { background:var(--ok); box-shadow:0 0 0 3px rgba(70,196,105,.15); }

  .new-btn { margin:8px 12px 10px; padding:11px 14px; border-radius:12px; cursor:pointer; background:var(--panel-2); color:var(--text); border:1px solid var(--border); display:flex; align-items:center; gap:9px; font-size:14px; font-weight:550; transition:.15s; }
  .new-btn:hover { background:var(--panel-3); border-color:var(--accent); }
  .new-btn svg { width:16px; height:16px; }

  .convo-list { flex:1; overflow-y:auto; padding:4px 8px 8px; }
  .convo-list::-webkit-scrollbar { width:8px; }
  .convo-list::-webkit-scrollbar-thumb { background:#2a2e37; border-radius:8px; }
  .conv-group-label { font-size:11px; color:var(--faint); padding:10px 10px 4px; letter-spacing:.4px; }
  .conv { display:flex; align-items:center; gap:8px; padding:9px 10px; border-radius:10px; cursor:pointer; color:var(--muted); font-size:13.5px; transition:.12s; margin-bottom:2px; }
  .conv:hover { background:var(--panel-2); color:var(--text); }
  .conv.active { background:var(--accent-soft); color:var(--text); }
  .conv .title { flex:1; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .conv .del { opacity:0; border:none; background:none; color:var(--faint); cursor:pointer; font-size:13px; padding:2px 4px; border-radius:6px; flex-shrink:0; }
  .conv:hover .del { opacity:1; }
  .conv .del:hover { color:var(--danger); background:rgba(229,103,91,.12); }

  .sidebar-foot { padding:10px 12px; border-top:1px solid var(--border-soft); display:flex; gap:8px; }
  .sidebar-foot button { flex:1; background:none; border:1px solid var(--border); color:var(--muted); border-radius:10px; padding:8px; font-size:12.5px; cursor:pointer; transition:.15s; }
  .sidebar-foot button:hover { color:var(--text); border-color:var(--accent); }

  .main { flex:1; display:flex; flex-direction:column; min-width:0; }
  .topbar { display:flex; align-items:center; gap:10px; padding:12px 18px; border-bottom:1px solid var(--border-soft); flex-shrink:0; }
  .topbar .hamb { display:none; background:none; border:none; color:var(--muted); font-size:20px; cursor:pointer; }
  .topbar .conv-title { font-size:14px; font-weight:600; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .topbar .spacer { flex:1; }
  .topbar select { background:var(--panel-2); color:var(--text); border:1px solid var(--border); border-radius:9px; padding:7px 10px; font-size:13px; cursor:pointer; }

  #chat { flex:1; overflow-y:auto; }
  #chat::-webkit-scrollbar { width:10px; }
  #chat::-webkit-scrollbar-thumb { background:#23272f; border-radius:8px; }
  .wrap { max-width:760px; margin:0 auto; padding:28px 20px 40px; }

  .msg { display:flex; gap:14px; margin-bottom:26px; animation:fade .25s ease; }
  @keyframes fade { from{opacity:0; transform:translateY(4px);} to{opacity:1; transform:none;} }
  .msg .avatar { width:30px; height:30px; border-radius:9px; flex-shrink:0; display:flex; align-items:center; justify-content:center; font-size:13px; font-weight:700; margin-top:2px; }
  .msg.user .avatar { background:var(--user-bubble); color:#a9c7ff; }
  .msg.assistant .avatar { background:linear-gradient(135deg,var(--accent),var(--accent-2)); color:#fff; }
  .msg .body { flex:1; min-width:0; }
  .msg .role { font-size:12px; color:var(--muted); margin-bottom:5px; font-weight:600; }
  .msg .content { line-height:1.7; font-size:15px; word-wrap:break-word; white-space:pre-wrap; }
  .msg.user .content { background:var(--user-bubble); padding:11px 15px; border-radius:4px 14px 14px 14px; display:inline-block; }
  .msg .content pre { background:#0a0c10; border:1px solid var(--border); border-radius:10px; padding:13px; overflow-x:auto; white-space:pre; font-size:13px; line-height:1.5; font-family:"SFMono-Regular",Consolas,monospace; margin:10px 0; }
  .msg .content code { font-family:"SFMono-Regular",Consolas,monospace; background:rgba(255,255,255,.06); padding:1px 5px; border-radius:5px; font-size:.9em; }
  .msg .content pre code { background:none; padding:0; }
  .attachments,.outfiles { display:flex; flex-wrap:wrap; gap:8px; margin-top:10px; }
  .chip { font-size:12px; background:var(--panel-2); border:1px solid var(--border); border-radius:9px; padding:5px 10px; color:var(--muted); display:flex; align-items:center; gap:6px; }
  .outfiles .lbl { width:100%; font-size:11.5px; color:var(--faint); margin-bottom:1px; }
  .outfiles a { font-size:12.5px; background:var(--panel-2); border:1px solid var(--border); border-radius:9px; padding:6px 11px; color:var(--link); text-decoration:none; transition:.15s; display:inline-flex; align-items:center; gap:6px; }
  .outfiles a:hover { border-color:var(--accent); background:var(--panel-3); }
  .status-line { color:var(--muted); font-size:14px; display:flex; align-items:center; gap:9px; }
  .dots { display:inline-flex; gap:3px; }
  .dots i { width:5px; height:5px; border-radius:50%; background:var(--accent-2); animation:bl 1.2s infinite; }
  .dots i:nth-child(2){ animation-delay:.2s; } .dots i:nth-child(3){ animation-delay:.4s; }
  @keyframes bl { 0%,80%,100%{opacity:.25;} 40%{opacity:1;} }

  .empty { text-align:center; color:var(--muted); margin-top:14vh; padding:0 20px; }
  .empty .big { width:54px; height:54px; border-radius:15px; background:linear-gradient(135deg,var(--accent),var(--accent-2)); display:flex; align-items:center; justify-content:center; color:#fff; font-weight:800; font-size:24px; margin:0 auto 16px; }
  .empty h2 { color:var(--text); font-weight:650; margin:0 0 6px; font-size:20px; }
  .empty p { font-size:13.5px; margin:0; }

  .composer { flex-shrink:0; padding:10px 0 16px; }
  .composer-inner { max-width:760px; margin:0 auto; padding:0 20px; }
  .pending-files { display:flex; flex-wrap:wrap; gap:8px; margin-bottom:9px; }
  .pending-files .chip { color:var(--text); padding:5px 8px 5px 11px; }
  .pending-files .chip button { background:none; border:none; color:var(--muted); cursor:pointer; font-size:15px; padding:0; line-height:1; }
  .input-row { display:flex; align-items:flex-end; gap:8px; background:var(--panel-2); border:1px solid var(--border); border-radius:18px; padding:8px; transition:border-color .15s; }
  .input-row:focus-within { border-color:var(--accent); }
  .input-row textarea { flex:1; resize:none; border:none; background:transparent; color:var(--text); font-size:15px; line-height:1.5; max-height:200px; font-family:inherit; outline:none; padding:8px 4px; }
  .icon-btn { background:transparent; color:var(--muted); border:none; width:38px; height:38px; border-radius:11px; cursor:pointer; font-size:22px; display:flex; align-items:center; justify-content:center; flex-shrink:0; transition:.15s; }
  .icon-btn:hover { color:var(--text); background:var(--panel-3); }
  .send-btn { background:var(--accent); color:#fff; border:none; width:38px; height:38px; border-radius:11px; cursor:pointer; display:flex; align-items:center; justify-content:center; flex-shrink:0; transition:.15s; }
  .send-btn svg { width:18px; height:18px; }
  .send-btn:disabled { opacity:.35; cursor:not-allowed; }
  .send-btn:hover:not(:disabled) { background:var(--accent-2); }
  .hint { text-align:center; color:var(--faint); font-size:11px; margin-top:9px; }

  .overlay { position:fixed; inset:0; z-index:60; background:rgba(8,9,12,.7); backdrop-filter:blur(3px); display:flex; align-items:center; justify-content:center; }
  .overlay.hidden { display:none; }
  .card { background:var(--panel); border:1px solid var(--border); border-radius:18px; padding:30px; width:min(420px,92vw); box-shadow:0 24px 60px rgba(0,0,0,.5); }
  .card .logo-lg { width:46px; height:46px; border-radius:13px; background:linear-gradient(135deg,var(--accent),var(--accent-2)); display:flex; align-items:center; justify-content:center; color:#fff; font-weight:800; font-size:22px; margin-bottom:14px; }
  .card h2 { margin:0 0 6px; font-size:21px; }
  .card p { color:var(--muted); font-size:13px; margin:0 0 18px; line-height:1.55; }
  .card label { display:block; font-size:12px; color:var(--muted); margin:14px 0 6px; }
  .card input { width:100%; padding:12px 13px; border-radius:11px; background:var(--panel-2); border:1px solid var(--border); color:var(--text); font-size:14px; outline:none; }
  .card input:focus { border-color:var(--accent); }
  .card .primary { margin-top:20px; width:100%; padding:13px; background:var(--accent); color:#fff; border:none; border-radius:11px; font-size:15px; font-weight:600; cursor:pointer; transition:.15s; }
  .card .primary:hover { background:var(--accent-2); }
  .card .err { color:var(--danger); font-size:13px; margin-top:10px; min-height:18px; }
  .card .actions { display:flex; gap:10px; margin-top:22px; }
  .card .actions button { flex:1; padding:12px; border-radius:11px; font-size:14px; cursor:pointer; border:none; }
  .card .actions .save { background:var(--accent); color:#fff; }
  .card .actions .close { background:var(--panel-2); color:var(--text); border:1px solid var(--border); }

  .scrim { position:fixed; inset:0; background:rgba(0,0,0,.45); z-index:20; display:none; }

  @media (max-width:760px) {
    .sidebar { position:fixed; inset:0 auto 0 0; transform:translateX(-100%); box-shadow:8px 0 30px rgba(0,0,0,.4); }
    .sidebar.open { transform:none; }
    .topbar .hamb { display:block; }
    .scrim.show { display:block; }
    .msg.user .content { display:block; }
  }
  .quote-block{ border-left:3px solid var(--accent); background:rgba(201,100,66,.08); padding:7px 11px; border-radius:6px; margin-bottom:8px; font-size:13px; color:var(--muted); white-space:pre-wrap; max-height:96px; overflow:hidden; }
  .msg-actions{ margin-top:6px; opacity:0; transition:.12s; }
  .msg:hover .msg-actions{ opacity:1; }
  .quote-btn{ background:none; border:1px solid var(--border); color:var(--muted); border-radius:7px; font-size:11.5px; padding:3px 9px; cursor:pointer; }
  .quote-btn:hover{ color:var(--text); border-color:var(--accent); }
  #quoteBar{ display:none; align-items:center; gap:8px; background:var(--panel-2); border:1px solid var(--border); border-left:3px solid var(--accent); border-radius:10px; padding:8px 11px; margin-bottom:9px; font-size:13px; }
  #quoteBar .qb-txt{ flex:1; color:var(--muted); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  #quoteBar .qb-x{ background:none; border:none; color:var(--muted); font-size:16px; cursor:pointer; padding:0 4px; }
  #quoteBar .qb-x:hover{ color:var(--danger); }
</style>
</head>
<body>

<div class="overlay" id="gate">
  <div class="card">
    <div class="logo-lg">C</div>
    <h2>My Claude</h2>
    <p>私有的 Claude 客户端。请输入访问密码。</p>
    <label>访问密码</label>
    <input id="gatePassword" type="password" placeholder="输入密码" autocomplete="current-password" />
    <button class="primary" id="gateEnter">进入</button>
    <div class="err" id="gateErr"></div>
  </div>
</div>

<div class="app">
  <aside class="sidebar" id="sidebar">
    <div class="brand">
      <div class="logo">C</div>
      <div class="name">My Claude</div>
      <span class="status" id="statusDot" title="运行状态"></span>
    </div>
    <button class="new-btn" id="newBtn">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg>
      新对话
    </button>
    <div class="convo-list" id="convoList"></div>
    <div class="sidebar-foot">
      <button id="settingsBtn">设置</button>
      <button id="lockBtn">锁定</button>
    </div>
  </aside>
  <div class="scrim" id="scrim"></div>

  <main class="main">
    <div class="topbar">
      <button class="hamb" id="hamb">☰</button>
      <div class="conv-title" id="convTitle">新对话</div>
      <span class="spacer"></span>
      <select id="modelSelect" title="模型">
        <option value="">默认（按订阅）</option>
        <option value="sonnet">Sonnet</option>
        <option value="opus">Opus</option>
        <option value="haiku">Haiku</option>
        <option value="fable">Fable</option>
      </select>
    </div>

    <div id="chat"><div class="wrap" id="messages"></div></div>

    <div class="composer">
      <div class="composer-inner">
        <div class="pending-files" id="pendingFiles"></div>
        <div id="quoteBar"></div>
        <div class="input-row">
          <button class="icon-btn" id="attachBtn" title="上传文件">+</button>
          <input type="file" id="fileInput" multiple style="display:none" />
          <textarea id="input" rows="1" placeholder="给 Claude 发送消息…"></textarea>
          <button class="send-btn" id="sendBtn" title="发送">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 19V5M5 12l7-7 7 7"/></svg>
          </button>
        </div>
        <div class="hint">消息由你工作机上的 Claude 处理。Enter 发送，Shift+Enter 换行。</div>
      </div>
    </div>
  </main>
</div>

<div class="overlay hidden" id="settings">
  <div class="card">
    <h2 style="font-size:18px">设置</h2>
    <label>信箱地址（Worker / Val Town URL）</label>
    <input id="backendUrl" type="text" placeholder="https://...web.val.run" />
    <div class="actions">
      <button class="close" id="settingsClose">关闭</button>
      <button class="save" id="settingsSave">保存</button>
    </div>
  </div>
</div>

<script>
(function () {
  "use strict";

  var DEFAULT_BACKEND = "https://claude-relay-u6re.onrender.com";

  var state = {
    password: sessionStorage.getItem("mcm_password") || "",
    backendUrl: localStorage.getItem("mcm_backend_v2") || DEFAULT_BACKEND,
    model: localStorage.getItem("mcm_model") || "",
    convos: [],
    activeId: null,
    pending: [],
    quote: null,
    busy: false
  };

  function $(id){ return document.getElementById(id); }
  function uid(){ return "c" + Date.now().toString(36) + Math.random().toString(36).slice(2,8); }
  function escapeHtml(s){ return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }
  function sleep(ms){ return new Promise(function(r){ setTimeout(r,ms); }); }
  function fmtSize(n){ if(n<1024) return n+" B"; if(n<1048576) return (n/1024).toFixed(1)+" KB"; return (n/1048576).toFixed(1)+" MB"; }
  function setStatus(on){ $("statusDot").classList.toggle("on", !!on); }

  function renderContent(text){
    var parts = String(text).split(/```/), html="";
    for (var i=0;i<parts.length;i++){
      if (i%2===1){ html += "<pre><code>" + escapeHtml(parts[i].replace(/^[a-zA-Z0-9_-]*\n/,"")) + "</code></pre>"; }
      else { html += escapeHtml(parts[i]).replace(/`([^`]+)`/g,"<code>$1</code>"); }
    }
    return html;
  }
  function readAsDataURL(file){ return new Promise(function(res,rej){ var r=new FileReader(); r.onload=function(){res(r.result);}; r.onerror=rej; r.readAsDataURL(file); }); }

  function loadConvos(){
    try { state.convos = JSON.parse(localStorage.getItem("mcm_convos")||"[]"); } catch(e){ state.convos=[]; }
    state.activeId = localStorage.getItem("mcm_active") || null;
  }
  function saveConvos(){
    localStorage.setItem("mcm_convos", JSON.stringify(state.convos));
    if (state.activeId) localStorage.setItem("mcm_active", state.activeId);
  }
  function getActive(){ for (var i=0;i<state.convos.length;i++){ if(state.convos[i].id===state.activeId) return state.convos[i]; } return null; }
  function createConvo(){
    var c = { id:uid(), title:"", createdAt:Date.now(), updatedAt:Date.now(), messages:[] };
    state.convos.unshift(c); state.activeId=c.id; saveConvos(); return c;
  }
  function makeTitle(text, files){
    var t=(text||"").trim().replace(/\s+/g," ");
    if (t) return t.length>26 ? t.slice(0,26)+"…" : t;
    if (files && files.length) return "（附件）";
    return "新对话";
  }

  function renderSidebar(){
    var list=$("convoList"); list.innerHTML="";
    if (!state.convos.length) return;
    var lbl=document.createElement("div"); lbl.className="conv-group-label"; lbl.textContent="对话"; list.appendChild(lbl);
    var sorted=state.convos.slice().sort(function(a,b){return b.updatedAt-a.updatedAt;});
    sorted.forEach(function(c){
      var row=document.createElement("div"); row.className="conv"+(c.id===state.activeId?" active":"");
      var title=document.createElement("div"); title.className="title"; title.textContent=c.title||"新对话";
      var del=document.createElement("button"); del.className="del"; del.textContent="✕"; del.title="删除";
      row.appendChild(title); row.appendChild(del);
      row.addEventListener("click", function(e){ if(e.target===del) return; switchTo(c.id); });
      del.addEventListener("click", function(e){ e.stopPropagation(); deleteConvo(c.id); });
      list.appendChild(row);
    });
  }
  function switchTo(id){
    if (state.busy){ alert("当前对话正在生成回复，请稍候再切换。"); return; }
    state.activeId=id; saveConvos(); renderSidebar(); renderMessages(); closeSidebarMobile();
  }
  function deleteConvo(id){
    if (!confirm("删除这个对话？")) return;
    state.convos = state.convos.filter(function(c){ return c.id!==id; });
    if (state.activeId===id) state.activeId = state.convos.length ? state.convos[0].id : null;
    if (!state.convos.length) createConvo();
    saveConvos(); renderSidebar(); renderMessages();
  }

  function buildOutFiles(jobId, files){
    var wrap=document.createElement("div"); wrap.className="outfiles";
    var lbl=document.createElement("div"); lbl.className="lbl"; lbl.textContent="Claude 生成的文件（点击下载）："; wrap.appendChild(lbl);
    files.forEach(function(f){
      var a=document.createElement("a");
      a.href=state.backendUrl+"/file?jobId="+encodeURIComponent(jobId)+"&name="+encodeURIComponent(f.name)+"&password="+encodeURIComponent(state.password);
      a.innerHTML="⬇ "+escapeHtml(f.name)+(f.size!=null?" <span style='color:var(--faint)'>("+fmtSize(f.size)+")</span>":"");
      a.target="_blank"; a.setAttribute("download", f.name);
      wrap.appendChild(a);
    });
    return wrap;
  }

  function appendMessage(msg){
    var el=document.createElement("div"); el.className="msg "+msg.role;
    var avatar=document.createElement("div"); avatar.className="avatar"; avatar.textContent=msg.role==="user"?"你":"C";
    var body=document.createElement("div"); body.className="body";
    var role=document.createElement("div"); role.className="role"; role.textContent=msg.role==="user"?"你":"Claude";
    var content=document.createElement("div"); content.className="content";
    content.innerHTML = renderContent(msg.text || (msg.role==="user"?"(仅附件)":""));
    body.appendChild(role);
    if (msg.quote){ var qbk=document.createElement("div"); qbk.className="quote-block"; qbk.textContent="引用 "+msg.quote.who+"："+msg.quote.text; body.appendChild(qbk); }
    body.appendChild(content);
    if (msg.role==="user" && msg.files && msg.files.length){
      var att=document.createElement("div"); att.className="attachments";
      msg.files.forEach(function(f){ var s=document.createElement("span"); s.className="chip"; s.textContent="📎 "+f.name; att.appendChild(s); });
      body.appendChild(att);
    }
    if (msg.role==="assistant" && msg.outFiles && msg.outFiles.length && msg.jobId){
      body.appendChild(buildOutFiles(msg.jobId, msg.outFiles));
    }
    var acts=document.createElement("div"); acts.className="msg-actions";
    var qbtn=document.createElement("button"); qbtn.className="quote-btn"; qbtn.textContent="↩ 引用";
    qbtn.addEventListener("click", function(){ setQuote(msg.role==="user"?"你":"Claude", msg.text||""); });
    acts.appendChild(qbtn); body.appendChild(acts);
    el.appendChild(avatar); el.appendChild(body);
    $("messages").appendChild(el);
    return { el:el, content:content, body:body };
  }

  function renderMessages(){
    var c=getActive();
    var box=$("messages"); box.innerHTML="";
    $("convTitle").textContent = c ? (c.title||"新对话") : "新对话";
    if (!c || !c.messages.length){
      box.innerHTML='<div class="empty"><div class="big">C</div><h2>开始和 Claude 对话</h2><p>发送文字，或用 + 上传文件。生成的文件会出现下载链接。</p></div>';
      return;
    }
    c.messages.forEach(function(m){ appendMessage(m); });
    scrollDown();
  }
  function scrollDown(){ var c=$("chat"); c.scrollTop=c.scrollHeight; }

  function setQuote(who, text){ state.quote={who:who, text:String(text||"").slice(0,4000)}; renderQuote(); $("input").focus(); }
  function clearQuote(){ state.quote=null; renderQuote(); }
  function renderQuote(){
    var bar=$("quoteBar");
    if (!state.quote){ bar.style.display="none"; bar.innerHTML=""; return; }
    var snip=state.quote.text.replace(/\s+/g," "); if (snip.length>90) snip=snip.slice(0,90)+"…";
    bar.innerHTML="<span class='qb-txt'>引用 "+escapeHtml(state.quote.who)+"："+escapeHtml(snip)+"</span>";
    var x=document.createElement("button"); x.className="qb-x"; x.textContent="×"; x.addEventListener("click", clearQuote); bar.appendChild(x);
    bar.style.display="flex";
  }

  function showApp(){ $("gate").classList.add("hidden"); }
  function tryEnter(){
    var pw=$("gatePassword").value.trim();
    if(!pw){ $("gateErr").textContent="请输入密码。"; return; }
    state.password=pw; sessionStorage.setItem("mcm_password",pw);
    showApp(); boot();
  }
  $("gateEnter").addEventListener("click", tryEnter);
  $("gatePassword").addEventListener("keydown", function(e){ if(e.key==="Enter") tryEnter(); });

  $("settingsBtn").addEventListener("click", function(){ $("backendUrl").value=state.backendUrl; $("settings").classList.remove("hidden"); });
  $("settingsClose").addEventListener("click", function(){ $("settings").classList.add("hidden"); });
  $("settingsSave").addEventListener("click", function(){
    state.backendUrl=$("backendUrl").value.trim().replace(/\/+$/,"")||DEFAULT_BACKEND;
    localStorage.setItem("mcm_backend_v2", state.backendUrl); $("settings").classList.add("hidden");
  });
  $("lockBtn").addEventListener("click", function(){ sessionStorage.removeItem("mcm_password"); location.reload(); });

  $("modelSelect").value=state.model;
  $("modelSelect").addEventListener("change", function(){ state.model=$("modelSelect").value; localStorage.setItem("mcm_model", state.model); });

  function openSidebarMobile(){ $("sidebar").classList.add("open"); $("scrim").classList.add("show"); }
  function closeSidebarMobile(){ $("sidebar").classList.remove("open"); $("scrim").classList.remove("show"); }
  $("hamb").addEventListener("click", openSidebarMobile);
  $("scrim").addEventListener("click", closeSidebarMobile);

  $("attachBtn").addEventListener("click", function(){ $("fileInput").click(); });
  $("fileInput").addEventListener("change", async function(e){
    var files=Array.prototype.slice.call(e.target.files);
    for (var i=0;i<files.length;i++){
      var f=files[i];
      try { var d=await readAsDataURL(f); state.pending.push({ name:f.name, dataBase64:d.split(",")[1] }); }
      catch(err){ alert("读取文件失败："+f.name); }
    }
    renderPending(); $("fileInput").value="";
  });
  function renderPending(){
    var c=$("pendingFiles"); c.innerHTML="";
    state.pending.forEach(function(p,idx){
      var chip=document.createElement("div"); chip.className="chip";
      chip.innerHTML="<span>📎 "+escapeHtml(p.name)+"</span>";
      var x=document.createElement("button"); x.textContent="×";
      x.addEventListener("click", function(){ state.pending.splice(idx,1); renderPending(); });
      chip.appendChild(x); c.appendChild(chip);
    });
  }

  $("newBtn").addEventListener("click", function(){
    if (state.busy){ alert("当前对话正在生成回复，请稍候。"); return; }
    createConvo(); state.pending=[]; renderPending(); renderSidebar(); renderMessages(); closeSidebarMobile();
    $("input").focus();
  });

  var input=$("input");
  input.addEventListener("input", function(){ input.style.height="auto"; input.style.height=Math.min(input.scrollHeight,200)+"px"; });
  input.addEventListener("keydown", function(e){ if(e.key==="Enter" && !e.shiftKey){ e.preventDefault(); send(); } });
  $("sendBtn").addEventListener("click", send);

  async function send(){
    if (state.busy) return;
    var text=input.value.trim();
    if (!text && state.pending.length===0 && !state.quote) return;
    if (!state.backendUrl){ alert("请先在设置里填信箱地址。"); return; }

    var convo=getActive() || createConvo();
    state.activeId=convo.id;
    var filesMeta=state.pending.map(function(p){ return { name:p.name }; });
    var filesPayload=state.pending.map(function(p){ return { name:p.name, dataBase64:p.dataBase64 }; });
    var q=state.quote;
    var backendMessage = q ? ("【引用 "+q.who+" 之前说的】\n"+q.text+"\n\n【我的问题】\n"+text) : text;

    var userMsg={ role:"user", text:text, files:filesMeta, quote:q };
    convo.messages.push(userMsg);
    if (!convo.title) convo.title=makeTitle(text, filesMeta);
    convo.updatedAt=Date.now();
    saveConvos(); renderSidebar();
    if ($("messages").querySelector(".empty")) renderMessages(); else appendMessage(userMsg);
    $("convTitle").textContent=convo.title;
    scrollDown();

    var aiMsg={ role:"assistant", text:"", outFiles:[], jobId:null };
    convo.messages.push(aiMsg);
    var ui=appendMessage(aiMsg);
    ui.content.innerHTML="<span class='status-line'>已提交，排队中<span class='dots'><i></i><i></i><i></i></span></span>";

    input.value=""; input.style.height="auto"; state.pending=[]; renderPending();
    state.quote=null; renderQuote();
    state.busy=true; $("sendBtn").disabled=true; setStatus(true);
    var convoId=convo.id;

    try {
      var sres=await fetch(state.backendUrl+"/submit",{
        method:"POST", headers:{ "Content-Type":"application/json" },
        body: JSON.stringify({ password:state.password, conversationId:convo.id, model:state.model, message:backendMessage, files:filesPayload })
      });
      if (!sres.ok){
        if (sres.status===401){ aiMsg.text="(密码错误或已失效，请点左下角『锁定』重输)"; sessionStorage.removeItem("mcm_password"); }
        else { aiMsg.text="(提交失败 "+sres.status+")"; }
        if (state.activeId===convoId && document.body.contains(ui.content)) ui.content.innerHTML="<span style='color:var(--danger)'>"+escapeHtml(aiMsg.text)+"</span>";
        saveConvos(); return;
      }
      var jobId=(await sres.json()).jobId; aiMsg.jobId=jobId;

      var lastLen=0;
      while (true){
        await sleep(1500);
        var rres; try { rres=await fetch(state.backendUrl+"/result?jobId="+encodeURIComponent(jobId)+"&password="+encodeURIComponent(state.password)); } catch(e){ continue; }
        if (!rres.ok) continue;
        var d=await rres.json();
        var live = state.activeId===convoId && document.body.contains(ui.content);
        if (d.output && d.output.length!==lastLen){
          lastLen=d.output.length; aiMsg.text=d.output;
          if (live){ ui.content.innerHTML=renderContent(d.output); scrollDown(); }
        } else if (!d.output && live){
          ui.content.innerHTML="<span class='status-line'>"+(d.status==="queued"?"排队中":"处理中")+"<span class='dots'><i></i><i></i><i></i></span></span>";
        }
        if (d.done){
          aiMsg.text=d.output||aiMsg.text;
          aiMsg.outFiles=(d.files||[]);
          if (d.error && !d.output) aiMsg.text="[错误] "+d.error;
          else if (d.error) aiMsg.errorNote=d.error;
          if (!aiMsg.text) aiMsg.text="(无文字输出)";
          convo.updatedAt=Date.now(); saveConvos(); renderSidebar();
          if (state.activeId===convoId && document.body.contains(ui.content)){
            ui.content.innerHTML=renderContent(aiMsg.text);
            if (aiMsg.errorNote){ var en=document.createElement("div"); en.style.cssText="color:var(--danger);font-size:13px;margin-top:6px"; en.textContent="["+aiMsg.errorNote+"]"; ui.body.appendChild(en); }
            if (aiMsg.outFiles.length) ui.body.appendChild(buildOutFiles(jobId, aiMsg.outFiles));
            scrollDown();
          }
          break;
        }
      }
    } catch(err){
      aiMsg.text="(网络错误："+String(err)+")"; saveConvos();
      if (state.activeId===convoId && document.body.contains(ui.content)) ui.content.innerHTML="<span style='color:var(--danger)'>"+escapeHtml(aiMsg.text)+"</span>";
    } finally {
      state.busy=false; $("sendBtn").disabled=false; setStatus(false);
    }
  }

  function boot(){
    loadConvos();
    if (!state.convos.length) createConvo();
    if (!getActive()){ state.activeId=state.convos[0].id; saveConvos(); }
    renderSidebar(); renderMessages();
  }

  if (state.password){ showApp(); boot(); } else { $("gatePassword").focus(); }

})();
</script>
</body>
</html>
